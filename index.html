<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tomoe Food — Delivery Scan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:15px;padding-bottom:32px}
header{background:#1a3a5c;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
header h1{font-size:1rem;font-weight:700}
.container{max-width:520px;margin:0 auto;padding:12px}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:10px}
.row{display:flex;gap:8px}
.inp{flex:1;padding:11px 12px;border:1.5px solid #d0d7de;border-radius:8px;font-size:.95rem;outline:none;-webkit-appearance:none}
.inp:focus{border-color:#1a3a5c}
.btn-dark{background:#1a3a5c;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;padding:11px 16px;font-size:.9rem}
.cust-info{margin-top:10px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:10px 12px;display:none}
.cname{font-weight:700;color:#0369a1;font-size:.95rem}
.cdetail{font-size:.78rem;color:#555;margin-top:2px}
.photo-area{display:flex;flex-direction:column;gap:10px}
.photo-btn{width:100%;padding:16px;background:#1a3a5c;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
input[type=file]{display:none}
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.preview-wrap{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:#f0f2f5}
.preview-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.preview-wrap .del-photo{position:absolute;top:4px;right:4px;background:rgba(220,38,38,.85);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.upload-status{font-size:.78rem;text-align:center;padding:4px;min-height:20px}
.upload-status.ok{color:#16a34a;font-weight:600}
.upload-status.err{color:#dc2626;font-weight:600}
.upload-status.uploading{color:#0369a1}
.dbx-bar{display:flex;align-items:center;gap:10px;background:#f8f9fa;border-radius:8px;padding:10px 12px;border:1.5px solid #e5e7eb}
.dbx-dot{width:10px;height:10px;border-radius:50%;background:#e5e7eb;flex-shrink:0}
.dbx-dot.ok{background:#22c55e}
.dbx-dot.err{background:#ef4444}
.dbx-label{flex:1;font-size:.82rem;color:#555}
.dbx-btn{font-size:.75rem;color:#1a3a5c;font-weight:700;background:none;border:none;cursor:pointer;padding:2px 4px}
.manual-row{display:flex;gap:8px;margin-top:6px}
.manual-inp{flex:1;padding:10px 12px;border:1.5px solid #d0d7de;border-radius:8px;font-size:.9rem;outline:none;-webkit-appearance:none}
.manual-inp:focus{border-color:#1a3a5c}
.add-btn{padding:10px 16px;background:#475569;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer}
.divider{text-align:center;font-size:.72rem;color:#bbb;margin:6px 0}
.items-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.clear-btn{font-size:.75rem;color:#dc2626;background:none;border:none;cursor:pointer;font-weight:600;padding:4px 8px}
.scan-list{list-style:none;display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto}
.scan-item{background:#f8f9fa;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;border-left:3px solid #1a3a5c;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.si-num{background:#1a3a5c;color:#fff;border-radius:50%;width:24px;height:24px;min-width:24px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700}
.si-body{flex:1;min-width:0}
.si-desc{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-code{font-size:.75rem;color:#888;font-family:monospace;margin-top:1px}
.del-btn{background:#fee2e2;border:none;color:#dc2626;cursor:pointer;font-size:.8rem;font-weight:700;padding:6px 10px;border-radius:6px;white-space:nowrap}
.empty-state{text-align:center;color:#bbb;padding:24px;font-size:.85rem}
.totals{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.total-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;padding:14px;text-align:center}
.tb-label{font-size:.68rem;font-weight:700;text-transform:uppercase;color:#0369a1;letter-spacing:.05em}
.tb-value{font-size:2rem;font-weight:800;color:#1a3a5c;line-height:1.1;margin-top:4px}
.tb-unit{font-size:.72rem;color:#666;margin-top:2px}
.submit-btn{width:100%;padding:15px;background:#22c55e;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:800;cursor:pointer;margin-bottom:8px}
.submit-btn:active{transform:scale(.98)}
.save-note{font-size:.75rem;color:#888;text-align:center;line-height:1.5}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.toast.ok{background:#16a34a}
.toast.err{background:#dc2626}
.picker{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.picker .plabel{font-size:.72rem;color:#888;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.picker button{text-align:left;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:9px 12px;cursor:pointer;font-size:.88rem;width:100%}
</style>
</head>
<body>
<header>
  <span style="font-size:1.4rem">&#128230;</span>
  <h1>Tomoe Food &#8212; Delivery Scan</h1>
</header>
<div class="container">

  <!-- Dropbox connection -->
  <div class="card">
    <div class="card-title">Dropbox</div>
    <div class="dbx-bar">
      <div class="dbx-dot" id="dbxDot"></div>
      <div class="dbx-label" id="dbxLabel">Not connected</div>
      <button class="dbx-btn" onclick="connectDropbox()">Connect</button>
    </div>
  </div>

  <!-- Customer -->
  <div class="card">
    <div class="card-title">Customer</div>
    <div class="row">
      <input class="inp" id="custInput" type="text" placeholder="Account no., number, or name..." onkeydown="if(event.key==='Enter')lookupCustomer()">
      <button class="btn-dark" onclick="lookupCustomer()">Find</button>
    </div>
    <div id="namePicker"></div>
    <div class="cust-info" id="custInfo">
      <div class="cname" id="custName"></div>
      <div class="cdetail" id="custDetail"></div>
    </div>
  </div>

  <!-- Photos -->
  <div class="card">
    <div class="card-title">Delivery Photos</div>
    <div class="photo-area">
      <label class="photo-btn" for="photoInput">
        &#128247; Take Photo of Label / Box
      </label>
      <input type="file" id="photoInput" accept="image/*" capture="environment" multiple onchange="onPhotos(this)">
      <div class="preview-grid" id="previewGrid"></div>
      <div class="upload-status" id="uploadStatus"></div>
    </div>
  </div>

  <!-- Manual barcode -->
  <div class="card">
    <div class="card-title">Add Items</div>
    <div class="divider" style="margin-top:0">Enter barcode manually</div>
    <div class="manual-row">
      <input class="manual-inp" id="manualInput" type="text" placeholder="Type or paste barcode / item code..." onkeydown="if(event.key==='Enter')manualScan()">
      <button class="add-btn" onclick="manualScan()">Add</button>
    </div>
  </div>

  <!-- Scanned Items -->
  <div class="card">
    <div class="items-header">
      <div class="card-title" style="margin:0">Items</div>
      <button class="clear-btn" onclick="clearAll()">&#128465; Clear All</button>
    </div>
    <ul class="scan-list" id="scanList">
      <li class="empty-state">No items added yet</li>
    </ul>
  </div>

  <!-- Totals -->
  <div class="card">
    <div class="card-title">Totals</div>
    <div class="totals">
      <div class="total-box">
        <div class="tb-label">Total Cases</div>
        <div class="tb-value" id="totalCases">0</div>
        <div class="tb-unit">boxes / cases</div>
      </div>
      <div class="total-box">
        <div class="tb-label">Total Weight</div>
        <div class="tb-value" id="totalWeight">0.00</div>
        <div class="tb-unit">lbs</div>
      </div>
    </div>
  </div>

  <button class="submit-btn" onclick="submitDelivery()">&#10003; Submit Delivery</button>
  <div class="save-note">Photos upload to Dropbox. Excel log downloads to your device.</div>
</div>
<div class="toast" id="toast"></div>

// ── Dropbox ───────────────────────────────────────────────────────────────
function connectDropbox(){
  var token=prompt('Paste your Dropbox access token:');
  if(!token||!token.trim())return;
  DBX_TOKEN=token.trim();
  setDbxStatus(true);
  toast('Dropbox connected ✓','ok');
}
function setDbxStatus(ok){
  document.getElementById('dbxDot').className='dbx-dot'+(ok?' ok':' err');
  document.getElementById('dbxLabel').textContent=ok?'Connected — photos will upload to /Tomoe Delivery Photos/':'Not connected';
}

async function uploadToDropbox(blob, filename){
  if(!DBX_TOKEN){toast('Connect Dropbox first','err');return false;}
  var path='/Tomoe Delivery Photos/'+filename;
  var resp=await fetch('https://content.dropboxapi.com/2/files/upload',{
    method:'POST',
    headers:{
      'Authorization':'Bearer '+DBX_TOKEN,
      'Dropbox-API-Arg':JSON.stringify({path:path,mode:'add',autorename:true}),
      'Content-Type':'application/octet-stream'
    },
    body:blob
  });
  if(!resp.ok){var e=await resp.text();throw new Error(e);}
  return await resp.json();
}

// ── Customer ──────────────────────────────────────────────────────────────
function lookupCustomer(){
  var raw=document.getElementById('custInput').value.trim();
  if(!raw){toast('Enter account number or name','err');return;}
  var val=raw.toUpperCase();
  var c=CUSTOMER_DB.find(function(x){return x.accountNo.toUpperCase()===val;});
  if(!c) c=CUSTOMER_DB.find(function(x){return x.number&&x.number.toUpperCase()===val;});
  if(!c&&!isNaN(parseInt(val))) c=CUSTOMER_DB.find(function(x){return x.number&&parseInt(x.number)===parseInt(val);});
  if(!c) c=CUSTOMER_DB.find(function(x){return x.accountNo.toUpperCase().includes(val)&&val.length>=2;});
  if(!c){
    var matches=CUSTOMER_DB.filter(function(x){return x.name.toUpperCase().includes(val);});
    if(matches.length===1){c=matches[0];}
    else if(matches.length>1){showPicker(matches.slice(0,8),raw);return;}
  }
  if(c){setCustomer(c);}
  else{currentCustomer=null;document.getElementById('custInfo').style.display='none';toast('Not found: '+raw,'err');}
}
function showPicker(matches,query){
  var div=document.getElementById('namePicker');
  div.innerHTML='<div class="picker"><div class="plabel">Multiple matches — tap to select:</div>'+
    matches.map(function(c,i){return '<button onclick="pickIdx('+i+')"><strong>'+esc(c.name)+'</strong> <span style="color:#888;font-size:.78rem">'+esc(c.accountNo)+(c.number&&c.number!==c.accountNo?' · #'+c.number:'')+'</span></button>';}).join('')+'</div>';
  window._pm=matches;
}
function pickIdx(i){setCustomer(window._pm[i]);}
function setCustomer(c){
  currentCustomer=c;
  document.getElementById('custName').textContent=c.name;
  var addr=c.billTo.replace(c.name,'').replace(/^[,\s]+/,'').trim();
  var parts=[c.accountNo];
  if(c.number&&c.number!==c.accountNo)parts.push('#'+c.number);
  if(c.phone)parts.push(c.phone);
  if(addr)parts.push(addr);
  document.getElementById('custDetail').textContent=parts.join(' · ');

  toast('✓ '+c.name,'ok');
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}

// ── GS1 Parser ────────────────────────────────────────────────────────────
function parseGS1(raw){
  var r={};
  var re=/\((\d{2,4})\)([^(]*)/g,m;
  while((m=re.exec(raw))!==null)applyAI(m[1],m[2].trim(),r);
  if(r.gtin||r.weightLb!=null)return r;
  var AIS=['3105','3104','3103','3102','3101','3100','3205','3204','3203','3202','3201','3200','01','02','10','15','17'];
  var LEN={'01':16,'02':16,'10':-1,'15':8,'17':8,'3100':10,'3101':10,'3102':10,'3103':10,'3104':10,'3105':10,'3200':10,'3201':10,'3202':10,'3203':10,'3204':10,'3205':10};
  var s=raw.replace(/[]/g,''),i=0;
  while(i<s.length){var hit=false;for(var a=0;a<AIS.length;a++){var ai=AIS[a];if(s.indexOf(ai,i)===i){var l=LEN[ai]||0;var v2=l>0?s.slice(i+ai.length,i+l):s.slice(i+ai.length);applyAI(ai,v2,r);i=l>0?i+l:s.length;hit=true;break;}}if(!hit)i++;}
  return r;
}
function applyAI(ai,val,r){
  if(ai==='01'||ai==='02'){r.gtin=val.replace(/^0+/,'').slice(0,-1);}
  else if(ai==='10'){r.lot=val;}
  else if(/^310/.test(ai)){var dec=parseInt(ai[3]);r.weightKg=parseInt(val)/Math.pow(10,dec);r.weightLb=r.weightKg*2.20462;}
  else if(/^320/.test(ai)){var dec2=parseInt(ai[3]);r.weightLb=parseInt(val)/Math.pow(10,dec2);}
}
function lookupItem(gtin,raw){
  var it=ITEM_DB.find(function(i){return i.item===gtin||i.item===raw;});
  if(!it&&gtin)it=ITEM_DB.find(function(i){return gtin.endsWith(i.item)||i.item.endsWith(gtin);});
  if(!it&&raw)it=ITEM_DB.find(function(i){return raw.trim()===i.item;});
  return it||null;
}

// ── Photos ────────────────────────────────────────────────────────────────
async function onPhotos(input){
  var files=Array.from(input.files);
  if(!files.length)return;
  var grid=document.getElementById('previewGrid');
  var status=document.getElementById('uploadStatus');

  for(var i=0;i<files.length;i++){
    var file=files[i];
    var url=URL.createObjectURL(file);
    var idx=photos.length;
    photos.push({file:file,url:url,uploaded:false});

    var wrap=document.createElement('div');
    wrap.className='preview-wrap';
    wrap.id='photo-'+idx;
    wrap.innerHTML='<img src="'+url+'"><button class="del-photo" onclick="removePhoto('+idx+')">&#10005;</button>';
    grid.appendChild(wrap);
  }

  // Upload to Dropbox
  if(DBX_TOKEN){
    status.className='upload-status uploading';
    status.textContent='Uploading '+files.length+' photo(s) to Dropbox...';
    var now=new Date();
    var ts=now.toISOString().slice(0,19).replace(/:/g,'-');
    var custPart=currentCustomer?currentCustomer.accountNo:'UNKNOWN';
    var ok=0,fail=0;
    for(var j=photos.length-files.length;j<photos.length;j++){
      try{
        var fname=custPart+'_'+ts+'_'+(j+1)+'.jpg';
        await uploadToDropbox(photos[j].file,fname);
        photos[j].uploaded=true;ok++;
      }catch(e){fail++;console.error(e);}
    }
    if(fail===0){status.className='upload-status ok';status.textContent='✓ '+ok+' photo(s) uploaded to Dropbox';}
    else{status.className='upload-status err';status.textContent=ok+' uploaded, '+fail+' failed';}
  } else {
    status.className='upload-status err';
    status.textContent='Connect Dropbox to auto-upload photos';
  }
  input.value='';
}

function removePhoto(idx){
  photos[idx]=null;
  var wrap=document.getElementById('photo-'+idx);
  if(wrap)wrap.remove();
}

// ── Manual ────────────────────────────────────────────────────────────────
function manualScan(){
  var raw=document.getElementById('manualInput').value.trim();
  if(!raw){toast('Enter a barcode or item code','err');return;}
  document.getElementById('manualInput').value='';
  var gs1=parseGS1(raw);
  var item=lookupItem(gs1.gtin,raw);
  var weightLb=gs1.weightLb!=null?gs1.weightLb:null;
  scannedItems.push({raw:raw,itemCode:item?item.item:(gs1.gtin||raw),description:item?item.description:(gs1.gtin?'Item '+gs1.gtin:raw),weightLb:weightLb,lot:gs1.lot||''});
  render();
  toast(item?'✓ '+item.description:'Added: '+raw, item?'ok':'');
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  var ul=document.getElementById('scanList');
  if(!scannedItems.length){ul.innerHTML='<li class="empty-state">No items added yet</li>';document.getElementById('totalCases').textContent='0';document.getElementById('totalWeight').textContent='0.00';return;}
  ul.innerHTML=scannedItems.map(function(si,i){
    return '<li class="scan-item"><div class="si-num">'+(i+1)+'</div><div class="si-body"><div class="si-desc">'+esc(si.description)+'</div><div class="si-code">'+esc(si.itemCode)+(si.lot?' · Lot:'+esc(si.lot):'')+'</div></div>'+(si.weightLb!=null?'<div class="si-wt">'+si.weightLb.toFixed(2)+' lb</div>':'')+'<button class="del-btn" onclick="deleteItem('+i+')">&#128465; Delete</button></li>';
  }).join('');
  ul.scrollTop=ul.scrollHeight;
  document.getElementById('totalCases').textContent=scannedItems.length;
  var tw=scannedItems.reduce(function(s,x){return s+(x.weightLb||0);},0);
  document.getElementById('totalWeight').textContent=tw.toFixed(2);
}
function deleteItem(idx){scannedItems.splice(idx,1);render();toast('Item removed');}
function clearAll(){if(!scannedItems.length&&!photos.length)return;if(!confirm('Clear all items and photos?'))return;scannedItems=[];photos=[];document.getElementById('previewGrid').innerHTML='';document.getElementById('uploadStatus').textContent='';render();}

// ── Submit ────────────────────────────────────────────────────────────────
function submitDelivery(){
  if(!currentCustomer){toast('Select a customer first','err');return;}
  if(!scannedItems.length&&!photos.filter(Boolean).length){toast('Add items or photos first','err');return;}
  var now=new Date();
  var dateStr=now.toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'});
  var timeStr=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  var grouped={};
  scannedItems.forEach(function(si){var k=si.itemCode;if(!grouped[k])grouped[k]={itemCode:si.itemCode,description:si.description,cases:0,totalWt:0};grouped[k].cases++;grouped[k].totalWt+=(si.weightLb||0);});
  var newRows=Object.values(grouped).map(function(g){return[currentCustomer.accountNo,currentCustomer.name,dateStr,timeStr,g.itemCode,g.description,g.cases,g.totalWt>0?parseFloat(g.totalWt.toFixed(2)):''];});
  if(!newRows.length)newRows=[[currentCustomer.accountNo,currentCustomer.name,dateStr,timeStr,'','(photo only)',photos.filter(Boolean).length,'']];
  savedRows=savedRows.concat(newRows);
  var HEADERS=['Customer Number','Customer Name','Delivery Date','Delivery Time','Product Number','Product Name','Cases','Weight (lb)'];
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet([HEADERS].concat(savedRows));
  ws['!cols']=[{wch:16},{wch:28},{wch:14},{wch:12},{wch:14},{wch:34},{wch:8},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,'Deliveries');
  XLSX.writeFile(wb,'delivery-log-'+now.toISOString().slice(0,10)+'.xlsx');
  toast('Done! Excel downloaded ✓','ok');
  scannedItems=[];currentCustomer=null;photos=[];
  document.getElementById('custInput').value='';
  document.getElementById('custInfo').style.display='none';
  document.getElementById('previewGrid').innerHTML='';
  document.getElementById('uploadStatus').textContent='';
  render();
}

var _tt;
function toast(msg,type){var el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(type?' '+type:'');clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove('show');},2800);}
</script>
